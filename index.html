<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="HfG Erbe" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png" />
  <meta name="theme-color" content="#FF7B00" />
  <title>HfG Erbe</title>
  <script>
    const ONBOARDING_VERSION = '2026-07-13';
    let destination = 'Homepage/onboarding NEU.html';

    try {
      const onboardingDone =
        localStorage.getItem('commons_onboarding_done') === '1' ||
        localStorage.getItem('commonsOnboardingDone') === 'true';
      const completedVersion = localStorage.getItem('commons_onboarding_version');

      if (onboardingDone && completedVersion === ONBOARDING_VERSION) {
        destination = 'Homepage/Homepage.html';
      } else {
        localStorage.setItem('commons_setting_dark-mode', 'false');
        document.documentElement.classList.remove('dark-mode');
      }
    } catch (error) {}

    window.location.replace(destination);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=Homepage/onboarding%20NEU.html">
  </noscript>
</head>
<body></body>
</html>
