  <style>
    html, body { margin: 0; width: 100%; min-height: 100%; background: #02060d; }
    html.pwa-launch.launch-onboarding {
      background:
        radial-gradient(ellipse 58% 46% at 106% 106%, rgba(255,207,171,.34) 0%, rgba(242,171,142,.20) 42%, rgba(7,14,28,0) 74%),
        radial-gradient(ellipse 168% 132% at 104% 104%, rgba(242,171,142,.72) 0%, rgba(203,115,122,.48) 38%, rgba(99,74,83,.22) 72%, rgba(7,14,28,0) 96%),
        radial-gradient(ellipse 92% 74% at 20% 12%, rgba(42,63,107,.68) 0%, rgba(21,33,58,.46) 46%, rgba(7,14,28,0) 78%),
        linear-gradient(to right, rgba(1,4,10,.58) 0%, rgba(5,10,21,.18) 58%, transparent 82%),
        linear-gradient(180deg, #02060d 0%, #0b162a 50%, #15213a 100%);
    }
    html.pwa-launch.launch-onboarding body {
      background:
        radial-gradient(ellipse 58% 46% at 106% 106%, rgba(255,207,171,.34) 0%, rgba(242,171,142,.20) 42%, rgba(7,14,28,0) 74%),
        radial-gradient(ellipse 168% 132% at 104% 104%, rgba(242,171,142,.72) 0%, rgba(203,115,122,.48) 38%, rgba(99,74,83,.22) 72%, rgba(7,14,28,0) 96%),
        radial-gradient(ellipse 92% 74% at 20% 12%, rgba(42,63,107,.68) 0%, rgba(21,33,58,.46) 46%, rgba(7,14,28,0) 78%),
        linear-gradient(to right, rgba(1,4,10,.58) 0%, rgba(5,10,21,.18) 58%, transparent 82%),
        linear-gradient(180deg, #02060d 0%, #0b162a 50%, #15213a 100%);
    }
  </style>
  <script>
    const ONBOARDING_VERSION = '2026-07-13';
    let destination = 'Homepage/onboarding NEU.html';
    const isInstalledPwa = navigator.standalone === true ||
      window.matchMedia('(display-mode: standalone)').matches;
    if (isInstalledPwa) document.documentElement.classList.add('pwa-launch');

    try {
      const onboardingDone =
        localStorage.getItem('commons_onboarding_done') === '1' ||
        localStorage.getItem('commonsOnboardingDone') === 'true';
      const completedVersion = localStorage.getItem('commons_onboarding_version');

      if (onboardingDone && completedVersion === ONBOARDING_VERSION) {
        destination = 'Homepage/Homepage.html';
      } else {
        document.documentElement.classList.add('launch-onboarding');
        localStorage.setItem('commons_setting_dark-mode', 'false');
        document.documentElement.classList.remove('dark-mode');
      }
    } catch (error) {}

    // iOS muss Viewport und Statusleisten-Metadaten einmal aus dem Start-
    // dokument uebernehmen, bevor die Weiterleitung beginnt. Andernfalls
    // startet die erste PWA-Ansicht mit der weissen Standard-Statusleiste.
    function openInitialScreen() {
      requestAnimationFrame(() => window.location.replace(destination));
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', openInitialScreen, { once: true });
    } else {
      openInitialScreen();
    }
  </script>
