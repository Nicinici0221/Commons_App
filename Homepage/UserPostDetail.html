<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FF7B00" />
  <link rel="manifest" href="../manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="HfG Erbe" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="../assets/icons/icon-512.png" />
  <link rel="stylesheet" href="../assets/css/mobile-app.css" />
  <title>Beitrag</title>
  <script>(function(){try{if(localStorage.getItem("commons_setting_dark-mode")==="true")document.documentElement.classList.add("dark-mode");}catch(e){}})();</script>
  <link rel="stylesheet" href="dark-mode.css" />
  <script src="page-transition-head.js"></script>
  <link rel="stylesheet" href="page-transitions.css" />
  <style>
    @font-face { font-family: "Kurdis"; src: url("Kurdis Family Delivderables/WOFF2/Kurdis-Wide.woff2") format("woff2"), url("Kurdis Family Delivderables/WOFF/Kurdis-Wide.woff") format("woff"), url("Kurdis Family Delivderables/TTF/Kurdis-Wide.ttf") format("truetype"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "General Sans"; src: url("GeneralSans_Complete/GeneralSans_Complete/Fonts/WEB/fonts/GeneralSans-Variable.woff2") format("woff2"); font-weight: 100 900; font-style: normal; font-display: swap; }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; background: #e2e5df; font-family: "General Sans", -apple-system, BlinkMacSystemFont, sans-serif; color: #171a16; -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: center; padding: 20px; }

    @keyframes soft-fade { from { opacity: 0; } to { opacity: 1; } }

    /* Phone */
    .phone { position: relative; width: min(440px, calc(100vw - 40px)); aspect-ratio: 440 / 956; overflow: hidden; background: #fbfbfa; border-radius: 32px; box-shadow: 0 28px 80px rgba(35,42,36,.18); animation: soft-fade .3s ease both; }
    .phone::before { content: ""; position: absolute; top: 16px; left: 50%; width: 128px; height: 31px; border-radius: 18px; transform: translateX(-50%); background: #0a1020; z-index: 40; }

    /* Scroll */
    .detail-scroll { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; display: flex; flex-direction: column; }
    .detail-scroll::-webkit-scrollbar { display: none; }

    /* Status bar */
    .statusbar { position: absolute; top: 25px; left: 0; right: 0; height: 20px; z-index: 30; pointer-events: none; }
    .time { position: absolute; left: 45px; top: -1px; color: #171a16; font-size: 17px; font-weight: 600; letter-spacing: -.15px; }
    .status-icons { position: absolute; right: 43px; top: 0; display: flex; align-items: center; gap: 6px; color: #171a16; }
    .signal { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
    .signal span { width: 3px; background: currentColor; border-radius: 2px; }
    .signal span:nth-child(1) { height: 4px; opacity: .7; }
    .signal span:nth-child(2) { height: 6px; opacity: .8; }
    .signal span:nth-child(3) { height: 9px; opacity: .9; }
    .signal span:nth-child(4) { height: 12px; }
    .wifi { width: 17px; height: 12px; position: relative; }
    .wifi::before, .wifi::after { content: ""; position: absolute; left: 50%; border: 2px solid currentColor; border-bottom: 0; border-left-color: transparent; border-right-color: transparent; transform: translateX(-50%); }
    .wifi::before { top: 1px; width: 16px; height: 8px; border-radius: 16px 16px 0 0; opacity: .9; }
    .wifi::after { top: 6px; width: 8px; height: 5px; border-radius: 10px 10px 0 0; }
    .battery { width: 23px; height: 12px; border: 1.7px solid currentColor; border-radius: 4px; position: relative; }
    .battery::before { content: ""; position: absolute; right: -4px; top: 3px; width: 2px; height: 5px; border-radius: 2px; background: currentColor; }
    .battery::after { content: ""; position: absolute; inset: 2px 3px 2px 2px; border-radius: 2px; background: currentColor; }

    /* Hero */
    .detail-hero { position: relative; width: 100%; height: 46%; flex-shrink: 0; border-radius: 0 0 26px 26px; overflow: hidden; }
    .detail-hero img { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; display: block; }
    .detail-hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,.28) 0%, transparent 38%, transparent 55%, rgba(0,0,0,.48) 100%); pointer-events: none; }

    /* Nav buttons */
    .detail-back, .detail-share { position: absolute; top: 78px; z-index: 5; width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,.18); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.25); display: grid; place-items: center; text-decoration: none; cursor: pointer; color: #fff; }
    .detail-back { left: 24px; }
    .detail-share { right: 24px; }
    .detail-back svg, .detail-share svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 1.55; stroke-linecap: round; stroke-linejoin: round; }

    /* Location pill */
    .detail-location { position: absolute; bottom: 14px; left: 24px; z-index: 2; display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 400; color: rgba(255,255,255,.92); background: rgba(255,255,255,.18); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.25); border-radius: 999px; padding: 5px 10px 5px 8px; }
    .detail-location svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Hero actions pill */
    .hero-actions { position: absolute; bottom: 14px; right: 24px; z-index: 2; display: flex; align-items: center; gap: 1px; background: rgba(255,255,255,.18); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.25); border-radius: 999px; overflow: hidden; }
    .hero-action-btn { display: flex; align-items: center; gap: 5px; padding: 6px 11px; background: none; border: none; font-family: "General Sans", sans-serif; font-size: 12px; font-weight: 500; color: rgba(255,255,255,.92); cursor: pointer; transition: background .14s ease; }
    .hero-action-btn:active { background: rgba(255,255,255,.12); }
    .hero-action-btn + .hero-action-btn { border-left: 1px solid rgba(255,255,255,.2); }
    .hero-action-btn svg { width: 13px; height: 13px; stroke: rgba(255,255,255,.92); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .hero-like-btn.liked svg { fill: #ff6b6b; stroke: #ff6b6b; }

    /* Body */
    .detail-body { flex: 1; background: #fbfbfa; padding: 22px 24px 32px; display: flex; flex-direction: column; }
    .detail-eyebrow { font-size: 11px; font-weight: 400; color: rgba(23,26,22,.42); letter-spacing: .2px; margin-bottom: 8px; }
    .detail-title { font-family: "General Sans", sans-serif; font-size: 22px; font-weight: 500; color: #171a16; letter-spacing: -.3px; line-height: 1.15; margin-bottom: 14px; }
    .detail-divider { height: 1px; background: rgba(23,26,22,.07); margin-bottom: 20px; }
    .detail-text { font-size: 14px; font-weight: 300; color: rgba(23,26,22,.88); line-height: 1.6; }
    .detail-no-desc { font-size: 13px; font-weight: 300; color: rgba(23,26,22,.35); font-style: italic; }

    /* Info block */
    .detail-info { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .detail-info-row { display: flex; align-items: center; gap: 12px; }
    .detail-info-icon { flex: 0 0 36px; width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(240,241,238,.75)); border: 1px solid rgba(23,26,22,.08); box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 4px 12px rgba(30,32,30,.06); display: grid; place-items: center; }
    .detail-info-icon svg { width: 15px; height: 15px; stroke: rgba(23,26,22,.7); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .detail-info-label { font-size: 9.5px; font-weight: 700; color: rgba(23,26,22,.38); letter-spacing: .9px; text-transform: uppercase; margin-bottom: 1px; }
    .detail-info-value { font-size: 13px; font-weight: 400; color: rgba(23,26,22,.88); line-height: 1.3; }

    /* Comment sheet */
    .comment-modal { position: absolute; inset: 0; z-index: 60; pointer-events: none; border-radius: 32px; overflow: hidden; }
    .comment-modal.is-open { pointer-events: auto; }
    .comment-backdrop { position: absolute; inset: 0; background: rgba(23,26,22,.24); opacity: 0; transition: opacity .28s ease; }
    .comment-modal.is-open .comment-backdrop { opacity: 1; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
    .comment-sheet { position: absolute; left: 0; right: 0; bottom: 0; max-height: 68%; z-index: 1; background: #f7f8f5; border-radius: 24px 24px 0 0; transform: translateY(110%); transition: transform .36s cubic-bezier(.32,.72,.24,1); display: flex; flex-direction: column; overflow: hidden; }
    .comment-modal.is-open .comment-sheet { transform: translateY(0); }
    .comment-drag { flex: 0 0 auto; display: flex; justify-content: center; padding: 10px 0 6px; }
    .comment-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(23,26,22,.15); }
    .comment-header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 2px 20px 12px; border-bottom: 1px solid rgba(23,26,22,.07); }
    .comment-title { font-size: 15.5px; font-weight: 600; color: #171a16; letter-spacing: -.2px; }
    .comment-count-badge { font-weight: 300; color: rgba(23,26,22,.38); margin-left: 7px; font-size: 15px; }
    .comment-sort-btn { background: none; border: none; padding: 0; cursor: pointer; font-family: "General Sans", sans-serif; font-size: 13px; font-weight: 400; color: rgba(23,26,22,.48); display: flex; align-items: center; gap: 3px; }
    .comment-sort-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .comment-list { flex: 1; overflow-y: auto; padding: 14px 18px 8px; scrollbar-width: none; }
    .comment-list::-webkit-scrollbar { display: none; }
    .comment-empty { text-align: center; padding: 32px 20px; font-size: 13px; font-weight: 300; color: rgba(23,26,22,.38); }
    .comment-item { display: flex; gap: 10px; margin-bottom: 18px; }
    .comment-av { flex: 0 0 36px; width: 36px; height: 36px; border-radius: 50%; overflow: hidden; object-fit: cover; object-position: center top; }
    .comment-body-wrap { flex: 1; min-width: 0; }
    .comment-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .comment-name { font-size: 13px; font-weight: 600; color: #171a16; letter-spacing: -.1px; }
    .comment-time { font-size: 11.5px; font-weight: 300; color: rgba(23,26,22,.38); }
    .comment-text { font-size: 13.5px; font-weight: 300; color: #171a16; line-height: 1.4; margin-bottom: 6px; }
    .comment-actions { display: flex; align-items: center; gap: 14px; }
    .comment-like-btn { background: none; border: none; padding: 0; cursor: pointer; font-family: "General Sans", sans-serif; font-size: 12px; font-weight: 400; color: rgba(23,26,22,.42); display: flex; align-items: center; gap: 4px; }
    .comment-like-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .comment-like-btn.liked { color: #c0514a; }
    .comment-like-btn.liked svg { fill: #c0514a; stroke: #c0514a; }
    .comment-reply-btn { background: none; border: none; padding: 0; cursor: pointer; font-family: "General Sans", sans-serif; font-size: 12px; font-weight: 400; color: rgba(23,26,22,.42); }
    .comment-input-bar { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 10px 16px 14px; border-top: 1px solid rgba(23,26,22,.07); background: #f7f8f5; }
    .comment-input-av { flex: 0 0 34px; width: 34px; height: 34px; border-radius: 50%; overflow: hidden; background: #101110; display: grid; place-items: center; }
    .comment-input-av img { width: 90%; height: 90%; object-fit: contain; }
    .comment-input-field { flex: 1; background: rgba(23,26,22,.06); border: 1px solid rgba(23,26,22,.07); border-radius: 999px; padding: 9px 14px; font-family: "General Sans", sans-serif; font-size: 13.5px; font-weight: 300; color: #171a16; outline: none; }
    .comment-input-field::placeholder { color: rgba(23,26,22,.34); }
    .comment-send-btn { flex: 0 0 auto; width: 36px; height: 36px; border-radius: 50%; background: #171a16; border: none; cursor: pointer; display: grid; place-items: center; }
    .comment-send-btn svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>
<div class="phone">

  <!-- Status bar -->
  <div class="statusbar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <div class="signal"><span></span><span></span><span></span><span></span></div>
      <div class="wifi"></div>
      <div class="battery"></div>
    </div>
  </div>

  <div class="detail-scroll">

    <!-- Hero -->
    <div class="detail-hero">
      <img id="heroImg" src="" alt="">
      <a href="javascript:history.back()" onclick="if (window.smoothBack) { smoothBack(); return false; }" class="detail-back" aria-label="Zurück">
        <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <button class="detail-share" id="shareBtn" type="button" aria-label="Teilen">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
      </button>
      <div class="detail-location" id="locationPill">
        <svg viewBox="0 0 24 24"><path d="M20 10c0 6-8 13-8 13s-8-7-8-13a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="locationText"></span>
      </div>
      <div class="hero-actions">
        <button class="hero-action-btn hero-like-btn" id="heroLikeBtn" type="button">
          <svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>
          <span id="heroLikeCount">0</span>
        </button>
        <button class="hero-action-btn" id="heroCommentBtn" type="button">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span id="heroCommentCount">0</span>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="detail-body">
      <div class="detail-eyebrow" id="postEyebrow">Neuigkeit · Gerade eben</div>
      <h1 class="detail-title" id="postTitle"></h1>
      <div class="detail-divider"></div>
      <div class="detail-info" id="postInfoBlock"></div>
      <p id="postDesc"></p>
    </div>

  </div>

  <!-- Comment Sheet -->
  <section class="comment-modal" id="commentModal" aria-hidden="true">
    <div class="comment-backdrop" id="commentBackdrop"></div>
    <div class="comment-sheet">
      <div class="comment-drag"><div class="comment-handle"></div></div>
      <div class="comment-header">
        <span class="comment-title">Kommentare <span class="comment-count-badge" id="commentCountBadge">0</span></span>
        <button class="comment-sort-btn" id="commentSortBtn" type="button">Neueste <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></button>
      </div>
      <div class="comment-list" id="commentList">
        <div class="comment-empty" id="commentEmpty">Noch keine Kommentare. Sei der Erste!</div>
      </div>
      <div class="comment-input-bar">
        <div class="comment-input-av"><img id="commentAvImg" src="Icons/pb 10.png" alt=""></div>
        <input class="comment-input-field" type="text" placeholder="Kommentar schreiben…" id="commentInput">
        <button class="comment-send-btn" id="commentSend" type="button">
          <svg viewBox="0 0 24 24"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
        </button>
      </div>
    </div>
  </section>

</div>

<script>
  // Load post from localStorage
  const post = (function() { try { return JSON.parse(localStorage.getItem('nk_current_post') || '{}'); } catch { return {}; } })();
  const SEED = post.seed || 'default';
  const CAT_LABELS = { neuigkeit: 'Neuigkeit', event: 'Event', erfolg: 'Erfolg' };

  // Per-post storage keys
  const LIKE_KEY     = 'upd_hero_' + SEED;
  const CLIKES_KEY   = 'upd_clikes_' + SEED;
  const COMMENTS_KEY = 'upd_comments_' + SEED;

  function getLikedIds() { try { return new Set(JSON.parse(localStorage.getItem(CLIKES_KEY))||[]); } catch { return new Set(); } }
  function toggleLikedId(id, on) { const s = getLikedIds(); on ? s.add(id) : s.delete(id); localStorage.setItem(CLIKES_KEY, JSON.stringify([...s])); }
  function loadComments() { try { return JSON.parse(localStorage.getItem(COMMENTS_KEY)) || []; } catch { return []; } }
  function saveComments(c) { localStorage.setItem(COMMENTS_KEY, JSON.stringify(c)); }

  // Populate hero image
  document.getElementById('heroImg').src = post.imgSrc || ('https://picsum.photos/seed/' + SEED + '/800/600');

  // Location pill
  if (post.ort) {
    document.getElementById('locationText').textContent = post.ort;
  } else {
    document.getElementById('locationPill').style.display = 'none';
  }

  // Eyebrow
  const catLabel = CAT_LABELS[post.cat] || 'Neuigkeit';
  document.getElementById('postEyebrow').textContent = catLabel + ' · ' + (post.time || 'Gerade eben');

  // Title
  document.getElementById('postTitle').textContent = post.title || '';

  // Info block
  (function() {
    const block = document.getElementById('postInfoBlock');
    function infoRow(svgPath, label, value) {
      const row = document.createElement('div');
      row.className = 'detail-info-row';
      row.innerHTML = `<div class="detail-info-icon"><svg viewBox="0 0 24 24">${svgPath}</svg></div><div><div class="detail-info-label">${label}</div><div class="detail-info-value">${value}</div></div>`;
      block.appendChild(row);
    }
    if (post.datum) {
      infoRow('<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>', 'DATUM', post.datum);
    }
    if (post.ort) {
      infoRow('<path d="M20 10c0 6-8 13-8 13s-8-7-8-13a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>', 'ORT', post.ort);
    }
    if (post.adresse) {
      infoRow('<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>', 'ADRESSE', post.adresse);
    }
    if (post.veranstalter) {
      const label = post.veranstalterLabel || 'VERANSTALTER';
      infoRow('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>', label, post.veranstalter);
    }
    if (!block.children.length) block.style.display = 'none';
  })();

  // Description
  const descEl = document.getElementById('postDesc');
  if (post.desc) {
    descEl.className = 'detail-text';
    descEl.textContent = post.desc;
  } else {
    descEl.className = 'detail-no-desc';
    descEl.textContent = 'Keine Beschreibung hinzugefügt.';
  }

  // Hero like
  const likeBtn = document.getElementById('heroLikeBtn');
  const likeCountEl = document.getElementById('heroLikeCount');
  let heroLiked = localStorage.getItem(LIKE_KEY) === '1';
  if (heroLiked) { likeBtn.classList.add('liked'); likeCountEl.textContent = '1'; }
  likeBtn.addEventListener('click', () => {
    heroLiked = !heroLiked;
    likeBtn.classList.toggle('liked', heroLiked);
    likeCountEl.textContent = heroLiked ? '1' : '0';
    localStorage.setItem(LIKE_KEY, heroLiked ? '1' : '0');
  });

  // User info
  const USER_AVATAR = localStorage.getItem('commons_user_avatar') || 'Icons/pb 10.png';
  const USER_NAME   = localStorage.getItem('commons_user_name')   || 'Nici';
  document.getElementById('commentAvImg').src = USER_AVATAR;

  const HEART_SVG = '<svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>';
  const SEND_SVG  = '<svg viewBox="0 0 24 24"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>';

  let userComments = loadComments();
  let nextCid = userComments.length ? Math.min(...userComments.map(c => c.id)) - 1 : -1;
  let sortMode = 'newest';

  const sortSvg = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';

  function updateCommentCount() {
    const n = userComments.length;
    document.getElementById('heroCommentCount').textContent = n;
    document.getElementById('commentCountBadge').textContent = n;
    document.getElementById('commentEmpty').style.display = n ? 'none' : 'block';
  }

  function buildCommentEl(c) {
    const liked = getLikedIds().has(c.id);
    const item = document.createElement('div');
    item.className = 'comment-item';
    item.innerHTML = `
      <img class="comment-av" src="${c.avatar}" alt="">
      <div class="comment-body-wrap">
        <div class="comment-meta"><span class="comment-name">${c.name}</span><span class="comment-time">${c.time}</span></div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-actions">
          <button class="comment-like-btn${liked ? ' liked' : ''}" type="button" data-count="${c.likes}">${HEART_SVG}<span>${liked ? c.likes + 1 : c.likes}</span></button>
          <button class="comment-reply-btn" type="button">Antworten</button>
        </div>
      </div>`;
    item.querySelector('.comment-like-btn').addEventListener('click', function() {
      const nowLiked = this.classList.toggle('liked');
      this.querySelector('span').textContent = nowLiked ? parseInt(this.dataset.count) + 1 : this.dataset.count;
      toggleLikedId(c.id, nowLiked);
    });
    item.querySelector('.comment-reply-btn').addEventListener('click', () => showReplyInput(item.querySelector('.comment-body-wrap')));
    return item;
  }

  function renderComments() {
    const list = document.getElementById('commentList');
    Array.from(list.querySelectorAll('.comment-item')).forEach(el => el.remove());
    const sorted = sortMode === 'popular'
      ? [...userComments].sort((a, b) => b.likes - a.likes)
      : [...userComments];
    sorted.forEach(c => list.appendChild(buildCommentEl(c)));
    updateCommentCount();
  }

  document.getElementById('commentSortBtn').addEventListener('click', function() {
    sortMode = sortMode === 'newest' ? 'popular' : 'newest';
    this.innerHTML = (sortMode === 'newest' ? 'Neueste ' : 'Beliebteste ') + sortSvg;
    renderComments();
  });

  document.getElementById('heroCommentBtn').addEventListener('click', () => {
    sortMode = 'newest';
    document.getElementById('commentSortBtn').innerHTML = 'Neueste ' + sortSvg;
    renderComments();
    const modal = document.getElementById('commentModal');
    modal.classList.add('is-open');
    modal.setAttribute('aria-hidden', 'false');
  });

  document.getElementById('commentBackdrop').addEventListener('click', () => {
    const modal = document.getElementById('commentModal');
    modal.classList.remove('is-open');
    modal.setAttribute('aria-hidden', 'true');
    document.querySelectorAll('.reply-input-row').forEach(r => r.remove());
  });

  function showReplyInput(container) {
    document.querySelectorAll('.reply-input-row').forEach(r => r.remove());
    const row = document.createElement('div');
    row.className = 'comment-reply-row reply-input-row';
    row.style.cssText = 'display:flex;gap:8px;margin-top:8px;align-items:center;';
    row.innerHTML = `
      <img src="${USER_AVATAR}" alt="" style="width:28px;height:28px;object-fit:contain;background:#101110;border-radius:50%;flex-shrink:0;">
      <div style="flex:1;display:flex;gap:6px;align-items:center;">
        <input type="text" class="comment-input-field reply-field" placeholder="Antwort schreiben…" style="flex:1;font-size:12px;padding:7px 12px;">
        <button class="comment-send-btn reply-send" type="button" style="width:30px;height:30px;flex-shrink:0;">${SEND_SVG}</button>
      </div>`;
    container.appendChild(row);
    const rf = row.querySelector('.reply-field');
    rf.focus();
    function submitReply() {
      const text = rf.value.trim(); if (!text) return;
      row.remove();
      const replyEl = document.createElement('div');
      replyEl.className = 'comment-item';
      replyEl.style.marginLeft = '24px';
      replyEl.innerHTML = `
        <img class="comment-av" src="${USER_AVATAR}" alt="" style="width:28px;height:28px;object-fit:contain;background:#101110;border-radius:50%;">
        <div class="comment-body-wrap">
          <div class="comment-meta"><span class="comment-name">${USER_NAME}</span><span class="comment-time">Jetzt</span></div>
          <div class="comment-text">${text}</div>
          <div class="comment-actions"><button class="comment-like-btn" type="button" data-count="0">${HEART_SVG}<span>0</span></button></div>
        </div>`;
      replyEl.querySelector('.comment-like-btn').addEventListener('click', function() {
        const isLiked = this.classList.toggle('liked');
        this.querySelector('span').textContent = isLiked ? 1 : 0;
      });
      container.appendChild(replyEl);
    }
    row.querySelector('.reply-send').addEventListener('click', submitReply);
    rf.addEventListener('keydown', e => { if (e.key === 'Enter') submitReply(); });
  }

  // New comment
  document.getElementById('commentSend').addEventListener('click', () => {
    const input = document.getElementById('commentInput');
    const text = input.value.trim(); if (!text) return;
    userComments.unshift({ id: nextCid--, avatar: USER_AVATAR, name: USER_NAME, time: 'Jetzt', text, likes: 0 });
    saveComments(userComments);
    renderComments();
    document.getElementById('commentList').scrollTop = 0;
    input.value = '';
  });
  document.getElementById('commentInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('commentSend').click(); });

  // Share
  document.getElementById('shareBtn').addEventListener('click', async () => {
    if (navigator.share) {
      try { await navigator.share({ title: post.title, text: post.desc, url: window.location.href }); } catch {}
    } else {
      try { await navigator.clipboard.writeText(window.location.href); } catch {}
      const btn = document.getElementById('shareBtn');
      btn.style.background = 'rgba(255,255,255,.38)';
      setTimeout(() => btn.style.background = '', 1200);
    }
  });

  // Live clock
  (function() {
    const el = document.querySelector('.time');
    if (!el) return;
    const u = () => { const n = new Date(); el.textContent = n.getHours() + ':' + String(n.getMinutes()).padStart(2, '0'); };
    u(); setInterval(u, 10000);
  })();

  // Initial render
  renderComments();
</script>
<script src="page-transition.js"></script>
</body>
</html>
